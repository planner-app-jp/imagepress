  <text x="276" y="138" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="52" fill="#111" text-anchor="middle" letter-spacing="2">PRESS</text>
  <!-- 写真ボックス -->
  <rect x="174" y="160" width="88" height="88" rx="8" ry="8" fill="none" stroke="#111" stroke-width="18"/>
