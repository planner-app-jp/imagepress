  <line x1="278" y1="217" x2="355" y2="217" stroke="#111" stroke-width="16" stroke-linecap="round"/>
  <!-- 下部テキスト行 -->
  <line x1="174" y1="276" x2="374" y2="276" stroke="#111" stroke-width="16" stroke-linecap="round"/>
  <line x1="174" y1="316" x2="374" y2="316" stroke="#111" stroke-width="16" stroke-linecap="round"/>
  <line x1="174" y1="356" x2="340" y2="356" stroke="#111" stroke-width="16" stroke-linecap="round"/>
</svg>
