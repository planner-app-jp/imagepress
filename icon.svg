    <path d="M342 260 C 328 262, 312 264, 302 268 C 294 272, 294 280, 302 284 C 328 294, 360 302, 390 326 L 428 372"/>
    <!-- 手首のカフ -->
    <path d="M474 334 L 442 370"/>
    <path d="M416 386 l -6 8"/>
    <!-- スパーク(勢いの線) -->
    <path d="M456 182 L 486 162"/>
    <path d="M470 212 L 504 204"/>
    <path d="M466 250 L 496 254"/>
  </g>
</svg>
