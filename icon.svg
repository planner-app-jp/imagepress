<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#ffffff"/>
  <!-- クリップ（左側バインダー） -->
  <rect x="108" y="148" width="72" height="196" rx="36" ry="36" fill="none" stroke="#111" stroke-width="22"/>
  <!-- 新聞本体 -->
  <rect x="148" y="72" width="256" height="356" rx="18" ry="18" fill="#fff" stroke="#111" stroke-width="22"/>
