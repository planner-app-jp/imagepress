<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- ImagePress icon: 手で線をつまんで圧縮するモチーフ(オリジナル作画) -->
  <rect width="512" height="512" rx="96" fill="#ffffff"/>
  <g fill="none" stroke="#1d1d1f" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- 上下の矢印(内向き) -->
    <path d="M256 54 v54"/>
    <path d="M232 88 l24 26 24-26"/>
    <path d="M256 458 v-54"/>
    <path d="M232 424 l24-26 24 26"/>
    <!-- 左から流れる線(圧縮されて収束) -->
    <path d="M44 186 C 130 182, 200 216, 268 240"/>
    <path d="M38 256 C 120 250, 190 252, 272 256"/>
    <path d="M44 326 C 130 330, 200 296, 268 272"/>
  </g>
  <!-- 手(ピクトグラム・塗り) -->
  <g fill="#1d1d1f" stroke="#1d1d1f" stroke-linecap="round">
    <!-- 手のひら+手首 -->
    <circle cx="436" cy="258" r="60" stroke="none"/>
    <rect x="436" y="212" width="76" height="92" rx="20" stroke="none"/>
    <!-- 人差し指(上) -->
    <line x1="420" y1="222" x2="316" y2="240" stroke-width="34"/>
    <!-- 親指(下) -->
    <line x1="420" y1="294" x2="320" y2="272" stroke-width="34"/>
  </g>
</svg>
