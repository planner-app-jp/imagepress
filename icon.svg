<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- ImagePress icon: 手で線をつまんで圧縮する線画(参考画像を元にオリジナルトレース) -->
  <rect width="512" height="512" rx="96" fill="#ffffff"/>
  <g fill="none" stroke="#1d1d1f" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- 上の矢印(下向き) -->
    <path d="M256 60 v4"/>
    <path d="M256 84 v34"/>
    <path d="M228 128 h56 l-28 42 z"/>
    <!-- 下の矢印(上向き) -->
    <path d="M256 452 v-4"/>
    <path d="M256 428 v-34"/>
    <path d="M228 384 h56 l-28 -42 z"/>
    <!-- 左から流れる5本の線(つまみ点へ収束・間隔を保つ) -->
    <path d="M52 202 C 128 198, 190 222, 232 236"/>
    <path d="M66 230 C 140 228, 200 244, 252 252"/>
    <path d="M56 256 C 140 252, 210 256, 272 259"/>
    <path d="M66 288 C 140 290, 200 274, 252 266"/>
    <path d="M52 316 C 128 320, 190 296, 232 282"/>
    <!-- 手(輪郭線) -->
    <!-- 人差し指: 上側→指先→内側→指の付け根 -->
